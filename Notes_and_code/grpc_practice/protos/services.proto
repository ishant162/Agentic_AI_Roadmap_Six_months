// protos/services.proto
syntax = "proto3";

// ─────────────────────────────────────────
// 1. UNARY — Add two numbers
// ─────────────────────────────────────────
service Calculator {
  rpc Add (AddRequest) returns (AddResponse);
}

message AddRequest {
  int32 a = 1;
  int32 b = 2;
}

message AddResponse {
  int32 result = 1;
}


// ─────────────────────────────────────────
// 2. SERVER STREAMING — Stream logs
// ─────────────────────────────────────────
service LogService {
  rpc GetLogs (LogRequest) returns (stream LogEntry);
}

message LogRequest {
  string service_name = 1;
}

message LogEntry {
  string message = 1;
  string level    = 2;  // INFO, WARN, ERROR
}


// ─────────────────────────────────────────
// 3. CLIENT STREAMING — Upload numbers, get sum
// ─────────────────────────────────────────
service Aggregator {
  rpc UploadNumbers (stream NumberChunk) returns (SumResponse);
}

message NumberChunk {
  int32 value = 1;
}

message SumResponse {
  int32 total         = 1;
  int32 count         = 2;
}


// ─────────────────────────────────────────
// 4. BIDIRECTIONAL STREAMING — Chat
// ─────────────────────────────────────────
service ChatService {
  rpc Chat (stream ChatMessage) returns (stream ChatMessage);
}

message ChatMessage {
  string user    = 1;
  string text    = 2;
}